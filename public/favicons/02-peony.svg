<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>Peony — layered bloom</title>
  <g transform="translate(32 32)">
    <!-- Outer layer: 6 soft-pink petals, larger. -->
    <g fill="#e5a9b8">
      <ellipse cx="0" cy="-18" rx="8" ry="13"/>
      <ellipse cx="0" cy="-18" rx="8" ry="13" transform="rotate(60)"/>
      <ellipse cx="0" cy="-18" rx="8" ry="13" transform="rotate(120)"/>
      <ellipse cx="0" cy="-18" rx="8" ry="13" transform="rotate(180)"/>
      <ellipse cx="0" cy="-18" rx="8" ry="13" transform="rotate(240)"/>
      <ellipse cx="0" cy="-18" rx="8" ry="13" transform="rotate(300)"/>
    </g>
    <!-- Inner layer: 6 deeper-rose petals, offset 30°, smaller. -->
    <g fill="#c06284">
      <ellipse cx="0" cy="-11" rx="5.5" ry="9" transform="rotate(30)"/>
      <ellipse cx="0" cy="-11" rx="5.5" ry="9" transform="rotate(90)"/>
      <ellipse cx="0" cy="-11" rx="5.5" ry="9" transform="rotate(150)"/>
      <ellipse cx="0" cy="-11" rx="5.5" ry="9" transform="rotate(210)"/>
      <ellipse cx="0" cy="-11" rx="5.5" ry="9" transform="rotate(270)"/>
      <ellipse cx="0" cy="-11" rx="5.5" ry="9" transform="rotate(330)"/>
    </g>
    <!-- Core: deep rose disc with a golden stamen-dot at its center. -->
    <circle cx="0" cy="0" r="4.5" fill="#8e3b5b"/>
    <circle cx="0" cy="0" r="1.8" fill="#e8b94e"/>
  </g>
</svg>
