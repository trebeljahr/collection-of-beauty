<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>Line of Beauty — after Hogarth</title>
  <!-- Hogarth's 1753 thesis: the serpentine S-curve is the most beautiful
       single line the eye can follow. Distilled here to its essence. -->
  <path d="M 50 8 C 50 22, 14 22, 14 32 C 14 42, 50 42, 50 56"
        fill="none" stroke="#1a1614" stroke-width="5" stroke-linecap="round"/>
</svg>
