<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>Enso — the single breath</title>
  <!-- Open-ended circle, the signature form of Zen brush calligraphy:
       beauty as one uninterrupted gesture. The gap (ki) is essential. -->
  <path d="M 46 14 A 22 22 0 1 1 30 10"
        fill="none" stroke="#1a1614" stroke-width="6" stroke-linecap="round"/>
</svg>
