services:
  # rclone serves ./assets-web/ as a read-only HTTP file server.
  # assets-web/ holds the web-ready derivatives built by `pnpm shrink` —
  # originals in assets/ are preserved untouched. Each subfolder
  # (collection-of-beauty, audubon-birds, kunstformen-images) becomes the
  # first path segment: /<folder>/<filename>.
  #
  # Next.js itself runs on the host via `npm run dev` (not in docker) —
  # containerised hot-reload is fiddly and the asset server is the only
  # piece that actually benefits from being pinned in a container.
  assets:
    image: rclone/rclone:latest
    container_name: cob-assets
    restart: unless-stopped
    ports:
      - "9100:8080"
    volumes:
      - ./assets-web:/data:ro
    command:
      - serve
      - http
      - /data
      - --addr=:8080
      - --read-only
