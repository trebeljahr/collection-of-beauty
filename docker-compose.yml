services:
  minio:
    image: minio/minio:latest
    container_name: cob-minio
    restart: unless-stopped
    ports:
      - "9100:9000"   # S3 API        → http://localhost:9100
      - "9101:9001"   # Web console   → http://localhost:9101
    volumes:
      # Bind-mount assets/ as MinIO's data root.
      # Each subfolder (audubon_birds/, kunstformen_images/, ...) becomes a bucket.
      # MinIO writes its own metadata to ./assets/.minio.sys/ — that's the price
      # of in-place serving. assets/ is already gitignored so it stays out of git.
      - ./assets:/data
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
