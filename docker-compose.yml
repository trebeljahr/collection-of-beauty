services:
  # rclone serves ./assets-web/ as a read-only HTTP file server.
  # assets-web/ holds the web-ready derivatives built by `pnpm shrink` —
  # originals in assets/ are preserved untouched. Each subfolder
  # (collection-of-beauty, audubon-birds, kunstformen-images) becomes the
  # first path segment: /<folder>/<filename>.
  assets:
    image: rclone/rclone:latest
    container_name: cob-assets
    restart: unless-stopped
    ports:
      - "9100:8080"
    volumes:
      - ./assets-web:/data:ro
    command:
      - serve
      - http
      - /data
      - --addr=:8080
      - --read-only

  # Next.js dev server. Source is bind-mounted for hot reload.
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: cob-web
    ports:
      - "3547:3547"
    volumes:
      # Mount source read-write so edits on host reflect in container.
      - .:/app
      # Anonymous volumes shadow the host's node_modules / .next so the
      # container's Linux-built artifacts aren't clobbered by the host.
      - /app/node_modules
      - /app/.next
      # pnpm's content-addressable store lives outside /app so it doesn't
      # leak into the bind-mounted host tree
      - pnpm-store:/pnpm-store
    depends_on:
      - assets
    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      # Single URL: the browser fetches pre-built variants directly from
      # the rclone container on the host's exposed port. No server-side
      # image fetching, so no need for a compose-internal origin URL.
      NEXT_PUBLIC_ASSETS_BASE_URL: "http://localhost:9100"
      PNPM_HOME: /pnpm-store
      npm_config_store_dir: /pnpm-store
    # Install happens at container start against the bind-mounted source;
    # node_modules is preserved in the anonymous volume above.
    # The echo at the front is so the URL is visible during the slow first
    # install — Next prints it again once it's actually listening.
    command:
      - sh
      - -c
      - "echo '==> dev server will be at http://localhost:3547' && pnpm install --frozen-lockfile && node scripts/build-data.mjs && pnpm exec next dev -H 0.0.0.0 -p 3547"

volumes:
  pnpm-store:
